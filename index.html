<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK_EA Trader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js"
        integrity="sha512-STof4xm1wgkfm7heWqFJVn58Hm3EtS31XFaagaa8VMReCXAkQnJZ+jEy8PCC/iT18dFy95WcExNHFTqLyp72eQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt&display=swap');

        * {
            font-family: 'Prompt', sans-serif;
        }
    </style>

</head>

<body>
    <div class="container mt-3">
      <div class="mx-auto text-center mt-3">
<i class='bx bxs-color bx-lg bx-football bx-tada' style='color:#ec6e14' ></i>
       <h1>เข้าสู่ระบบใช้งาน</h1>
        <div class="mb-3 mt-3">
            <label for="number"><i class='bx bx-barcode-reader bx-sm' style='color:#1186ec'  ></i> เลขพอร์ต:[Port ID]</label>
            <input type="text" class="form-control" id="id" maxlength="9" placeholder="กรอกเลขพอร์ตPU Prime ให้ถูกต้อง">
        </div>

 <div class="mb-3 mt-3">
            <label for="fname"><i class='bx bxs-user-pin bx-sm' style='color:#1186ec' ></i> ชื่อ สกุล:[Firstname Lastname]</label>
            <input type="text" class="form-control" id="fname" name="fname"  placeholder="กรอกชื่อ นามสกุลให้ถูกต้อง" required>
        </div>
      
        <div class="text-center">
            <button type="button" class="btn btn-lg btn-primary w-50" id="submit-btn">เข้าสู่ระบบ</button>
            <button type="button" class="btn btn-lg btn-primary w-50" id="bt2" disabled>
                <span class="spinner-grow spinner-grow-sm" role="status" aria-hidden="true"></span>
                รอสักครู่...
            </button>
        </div>
    </div>
<script>
    $("#bt2").hide()
    $(document).ready(() => {
        liff.init({
            liffId: '2009651859-UeYgZHD5',
            withLoginOnExternalBrowser: true
        })

        liff.ready.then(() => {
            let btn = document.getElementById('submit-btn')
            btn.addEventListener('click', submit)
        });
    })

    function submit() {
      let id = $('#id').val()
        let fname = $('#fname').val()
    if(id != '' && fname != '' ){
        $("#submit-btn").hide()
        $("#bt2").show()
        console.log('submit')
        

        let uid = liff.getDecodedIDToken().sub
$.post('https://script.google.com/macros/s/AKfycby2drlqxcPXtQ41igm0dfO96olpG3ZHGnoMTW1eI8NBGFhqSYQRkuUColgHiGYUFQ/exec', { opt: 'register', id: id,fname:fname, uid: uid }, function (res) {
            if (res != 'yes') {
              console.log(res)
              alert('🚫เข้าสู่ระบบไม่สำเร็จ\n✅รหัสสมาชิก(ถูกต้อง)\n❌ชื่อผิด!!!')
              liff.closeWindow()
            }else{
               alert('✅เข้าสู่ระบบเรียบร้อยแล้ว')
                 $("#submit-btn").show()
                $("#bt2").hide()
                liff.closeWindow()
            }
        })
    }else{
      alert('กรุณากรอกข้อมูลให้ครบ!!')
    }
    }
</script>
      
</body>
</html>
